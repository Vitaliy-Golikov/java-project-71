name: Java CI with SonarQube

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x app/gradlew

      - name: Build with Gradle
        run: cd app && ./gradlew build

      - name: Run tests
        run: cd app && ./gradlew test

      - name: Run linter
        run: cd app && ./gradlew checkstyleMain checkstyleTest

      - name: Run JaCoCo test report
        run: cd app && ./gradlew jacocoTestReport

      - name: SonarQube Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: cd app && ./gradlew sonarqube